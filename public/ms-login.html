<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneDrive Login — HydroAir Sistems</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; max-width: 520px; margin: 40px auto; padding: 20px; }
    .card { background: rgba(15,23,42,.9); border: 1px solid rgba(125,211,252,.3); border-radius: 12px; padding: 24px; }
    h1 { font-size: 1.3rem; margin: 0 0 12px; }
    p { color: #94a3b8; line-height: 1.5; }
    .code { font-size: 2rem; letter-spacing: 4px; text-align: center; margin: 20px 0; color: #7dd3fc; font-weight: 700; }
    a { color: #7dd3fc; }
    button { background: #1e293b; color: #e2e8f0; border: 2px solid #000; border-radius: 10px; padding: 12px 16px; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 12px; }
    button:hover { border-color: #7dd3fc; color: #7dd3fc; }
    .ok { color: #86efac; }
    .err { color: #fda4af; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Вход в OneDrive для Excel Online</h1>
    <p id="status">Нажмите кнопку, чтобы получить код.</p>
    <div id="codeBox" class="code" hidden></div>
    <p id="linkBox" hidden>Откройте <a id="verifyLink" href="https://microsoft.com/devicelogin" target="_blank">microsoft.com/devicelogin</a> и введите код.</p>
    <button type="button" id="startBtn">Получить код входа</button>
  </div>
  <script>
    const API = '';
    let pollTimer;

    async function poll() {
      const res = await fetch(API + '/api/auth/device/poll');
      const data = await res.json();
      if (data.status === 'completed') {
        clearInterval(pollTimer);
        document.getElementById('status').innerHTML = '<span class="ok">Готово! OneDrive подключён. Excel Online будет работать.</span>';
        document.getElementById('startBtn').textContent = 'Войти снова';
        return;
      }
      if (!data.ok) {
        clearInterval(pollTimer);
        document.getElementById('status').innerHTML = '<span class="err">' + (data.error || 'Ошибка входа') + '</span>';
      }
    }

    document.getElementById('startBtn').onclick = async () => {
      clearInterval(pollTimer);
      document.getElementById('status').textContent = 'Загрузка...';
      document.getElementById('codeBox').hidden = true;
      document.getElementById('linkBox').hidden = true;
      const res = await fetch(API + '/api/auth/device/start', { method: 'POST' });
      const data = await res.json();
      if (!data.ok) {
        document.getElementById('status').innerHTML = '<span class="err">' + (data.error || 'Не удалось начать вход') + '</span>';
        return;
      }
      document.getElementById('codeBox').textContent = data.userCode;
      document.getElementById('codeBox').hidden = false;
      document.getElementById('linkBox').hidden = false;
      document.getElementById('verifyLink').href = data.verificationUri;
      document.getElementById('status').textContent = 'Введите код на сайте Microsoft:';
      pollTimer = setInterval(poll, (data.interval || 5) * 1000);
      poll();
    };
  </script>
</body>
</html>
